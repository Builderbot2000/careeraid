title: CareerAid
description: Local-first desktop app for job search, resume tailoring, and application tracking.

remote_theme: just-the-docs/just-the-docs

url: "" # set to your GitHub Pages URL when known, e.g. https://yourusername.github.io

# Mermaid diagrams — rendered in code blocks with language "mermaid"
mermaid:
  version: "11.4.1"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 8
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Heading anchors
heading_anchors: true

# Aux links shown in top-right
aux_links:
  "GitHub": "https://github.com/yourusername/careeraid"
aux_links_new_tab: true

# Footer
footer_content: "CareerAid — local-first, all data stays on your machine."

# Collections
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

# Callouts (Just the Docs v0.6+)
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow

# Plugins — jekyll-remote-theme is required for GitHub Pages remote themes
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
